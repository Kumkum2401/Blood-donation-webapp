{% extends "base.html" %}

{% block content %}

<section class="card" style="text-align:center;">
    <h1>🩸 Blood Donation Hub</h1>
    <p>Connect. Save Lives. Donate Blood.</p>
</section>

<section class="stats">

    <div class="card">
        <h3>👥 Total Donors</h3>
        <p class="big">{{ donors_count }}</p>
    </div>

    <div class="card">
        <h3>🚨 Emergency Requests</h3>
        <p class="big">{{ requests_count }}</p>
    </div>

</section>

<!-- QUICK ACTION DASHBOARD -->
<section class="card">
    <h3>⚡ Quick Actions</h3>

    <div class="inline-form">

        <a href="{{ url_for('register_donor') }}">
            <button>➕ Register Donor</button>
        </a>

        <a href="{{ url_for('search_donors') }}">
            <button>🔍 Search Donor</button>
        </a>

        <a href="{{ url_for('emergency_request') }}">
            <button style="background:#b71c1c;">🚨 Emergency</button>
        </a>

        <a href="{{ url_for('compatibility_checker') }}">
            <button style="background:#6a1b9a;">🧬 Compatibility</button>
        </a>

        <a href="{{ url_for('compatibility_checker') }}">
            <button style="background:#6a1b9a;">Compatibility Checker</button>
        </a>

    </div>
</section>

{% endblock %}
